[Config]
; 基础设置
mixed-port = 7890
allow-lan = true
mode = rule
log-level = info
external-controller = 127.0.0.1:9090
ipv6 = false

; DNS 强化设置
dns-enable = true
dns-listen = 0.0.0.0:53
dns-enhanced-mode = fake-ip
dns-fake-ip-range = 198.18.0.1/16
dns-nameserver = https://dns.alidns.com/dns-query, https://doh.pub/dns-query
dns-fallback = https://dns.google/dns-query, https://1.1.1.1/dns-query

; 自定义策略组定义
; 格式：组名`策略`节点正则`额外参数
custom_proxy_group = 🚀 节点选择`select`[]⚡ 自动测速`DIRECT`.*
custom_proxy_group = ⚡ 自动测速`url-test`.*`http://www.gstatic.com/generate_204`300,,50

; 远程规则集引用 (对应你提供的 Fizzown 规则)
rule_provider = fizz_dns`http`https://raw.githubusercontent.com/fizzyob/DNS-Prevent-Leakage/refs/heads/main/dns`86400`classical

; 规则分流
custom_rule = RULE-SET,fizz_dns,🚀 节点选择
custom_rule = GEOIP,LAN,DIRECT
custom_rule = GEOIP,CN,DIRECT
custom_rule = MATCH,🚀 节点选择
